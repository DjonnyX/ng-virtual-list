<ng-container *ngIf="($params | async) as p">
    <x-substrate #substrate mode="rounded-rectangle" class="shape" [style.width.px]="width" [style.height.px]="height"
        [type]="($type | async)!" [width]="width" [height]="height" [roundCorner]="p.roundCorner" [strokeWidth]="8"
        [rippleColor]="p.rippleColor" [fillPositions]="fillPositions!" [fillColors]="($fillColors | async)!"
        [strokeColors]="p.strokeGradientColor" [strokeAnimationDuration]="p.strokeAnimationDuration"></x-substrate>
</ng-container>
