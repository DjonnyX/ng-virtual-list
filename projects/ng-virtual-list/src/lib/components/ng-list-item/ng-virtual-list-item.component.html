@let renderer = itemRenderer();
@let class = classes();
<div #item class="ngvl-item" [ngClass]="class" [part]="part()" [attr.ngvl-index]="index()" [attr.ngvl-visibility]="visibility" tabindex="-1">
    @if (_blendColor) {
        <div class="ngvl-item__blend-color" [style.--blend-color]="_blendColor"></div>
    }
    <div #container virtualClick [part]="fxPart()" [maxClickDistance]="maxClickDistance()" class="ngvl-item__container"
        [ngClass]="class" (onVirtualClick)="onClickHandler()">
        @if (renderer) {
            <ng-container [ngTemplateOutlet]="renderer" [ngTemplateOutletContext]="templateContext()" />
        }
    </div>
</div>
