@let renderer = itemRenderer();
@let class = classes();
<div #item class="ngvl-item" [part]="fxPart()" [ngClass]="class" [attr.ngvl-index]="index()" tabindex="-1">
    @if (_blendColor) {
        <div class="ngvl-item__blend-color" [style.--blend-color]="_blendColor"></div>
    }
    <div #container itemClick [maxClickDistance]="maxClickDistance()" class="ngvl-item__container" [ngClass]="class"
        (onClick)="onClickHandler()">
        @if (renderer) {
            <ng-container [ngTemplateOutlet]="renderer" [ngTemplateOutletContext]="templateContext()" />
        }
    </div>
</div>
