<div localeSensitive [langTextDir]="($langTextDir | async)!" [listDir]="($direction | async)!" class="ngvl__container"
    [ngClass]="($containerClasses | async)!">
    <div #scrollViewport cdkScrollable part="scroller" class="ngvl__scroller">
        <div #scrollContent [attr.aria-orientation]="($direction | async)!"
            [attr.aria-activedescendant]="$focusedElement | async" tabindex="0" part="list" class="ngvl__list"
            [ngClass]="($actualClasses | async)!">
            <ng-content></ng-content>
        </div>
    </div>
    <ng-scroll-bar #scrollBar [direction]="($direction | async)!" [size]="($thumbSize | async)!"
        [theme]="($scrollbarTheme | async)!" [thumbGradientPositions]="($thumbGradientPositions | async)!"
        [loading]="($loading | async)!" [prepared]="($prepared | async)!"
        [interactive]="($scrollbarInteractive | async)!" [show]="($show | async)!"
        [startOffset]="($startOffset | async)!" [endOffset]="($endOffset | async)!"
        [overscrollEnabled]="($overscrollEnabled | async)!" [scrollBehavior]="($scrollBehavior | async)!"
        [scrollbarMinSize]="($scrollbarMinSize | async)!" (onDrag)="onScrollBarDragHandler($event)"></ng-scroll-bar>
</div>
