<div #scrollViewport class="track" part="scrollbar-track" [ngStyle]="$styles | async" [ngClass]="($classes | async)!">
    <div #scrollContent class="thumb" part="scrollbar-thumb" [class.horizontal]="($isVertical | async)! == false"
        (pointerdown)="click($event)">
        <ng-container [ngTemplateOutlet]="($thumbRenderer | async)!"
            [ngTemplateOutletContext]="($templateContext | async)!"></ng-container>
    </div>
</div>

<ng-template #defaultRenderer let-api="api" let-width="width" let-height="height" let-fillPositions="fillPositions"
    let-params="params">
    <div class="shape" part="scrollbar-thumb__shape" [style.width.px]="width" [style.height.px]="height"></div>
</ng-template>
