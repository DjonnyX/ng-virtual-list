<div #track class="track" [ngStyle]="$styles | async" [ngClass]="$classes | async">
    <div #thumb class="thumb" [class.horizontal]="($isVertical | async)!">
        <ng-substrate #substrate mode="rounded-rectangle" class="shape" [type]="($type | async)!"
            [width]="($thumbWidth | async)!" [height]="($thumbHeight | async)!" [roundCorner]="($roundCorner | async)!"
            [strokeWidth]="8" [rippleColor]="($rippleColor | async)!" [fillPositions]="($thumbGradientPositions | async)!"
            [fillColors]="($thumbGradientFill | async)!" [strokeColors]="($strokeGradientColor | async)!"
            [strokeAnimationDuration]="($strokeAnimationDuration | async)!"
            (pointerdown)="substrate.ripple($event)"></ng-substrate>
    </div>
</div>
