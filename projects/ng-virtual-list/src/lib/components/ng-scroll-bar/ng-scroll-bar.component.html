<div #scrollViewport class="track" part="scrollbar-track" [ngStyle]="styles()" [ngClass]="{grabbing: grabbing()}">
    <div #scrollContent class="thumb" part="scrollbar-thumb" [class.horizontal]="!isVertical()"
        (pointerdown)="click($event)">
        <ng-container [ngTemplateOutlet]="thumbRenderer()" [ngTemplateOutletContext]="templateContext()" />
    </div>
</div>

<ng-template #defaultRenderer let-api="api" let-width="width" let-height="height" let-fillPositions="fillPositions"
    let-params="params">
    <div class="shape" part="scrollbar-thumb__shape" [style.width.px]="width" [style.height.px]="height"></div>
</ng-template>
