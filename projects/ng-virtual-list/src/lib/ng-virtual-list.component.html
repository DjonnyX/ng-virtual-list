<div aria-live="polite" aria-atomic="true" class="ngvl__screen-reader">
  {{ screenReaderFormattedMessage() }}
</div>

<ng-prerender-container #prerender [bounds]="bounds()!" [direction]="direction()"
  [dynamic]="dynamicSize()" [isVertical]="isVertical" [itemSize]="actualItemSize()" [trackBy]="trackBy()"
  [itemRenderer]="itemRenderer()" [startOffset]="scrollStartOffset()" [endOffset]="scrollEndOffset()"
  [scrollbarEnabled]="scroller.scrollbarShow()" [enabled]="dynamicSize() && snapScrollToEnd()" />

@if (snap()) {
  <div localeSensitive [langTextDir]="langTextDir()" #snappedContainer class="ngvl__snapped-container"
    [ngClass]="classes()">
    <div #snapped part="snapped-item" class="ngvl__list-snapper">
      <ng-container #snapRendererContainer></ng-container>
    </div>
  </div>
}
<ng-scroller #scroller class="ngvl__list-scroller" [classes]="classes()" [startOffset]="scrollStartOffset()"
  [direction]="direction()" [endOffset]="scrollEndOffset()" [scrollbarThumbRenderer]="scrollbarThumbRenderer()"
  [scrollbarThickness]="scrollbarThickness()" [scrollbarThumbParams]="scrollbarThumbParams()" [animationParams]="animationParams()"
  [focusedElement]="focusedElement()" [loading]="loading()" [overscrollEnabled]="overscrollEnabled()"
  [scrollbarEnabled]="scrollbarEnabled()" [scrollbarInteractive]="scrollbarInteractive()" [snapToItem]="snapToItem()"
  [snapToItemAlign]="snapToItemAlign()" [scrollbarMinSize]="scrollbarMinSize()" [scrollBehavior]="scrollBehavior()"
  [scrollingSettings]="scrollingSettings()" [motionBlur]="motionBlur()" [maxMotionBlur]="maxMotionBlur()">
  <ng-container #renderersContainer></ng-container>
</ng-scroller>
