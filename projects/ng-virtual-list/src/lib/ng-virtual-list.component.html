<div aria-live="polite" aria-atomic="true" class="ngvl__screen-reader">
  {{ $screenReaderFormattedMessage | async }}
</div>

<prerender-container #prerender [bounds]="($bounds | async)!" [direction]="($direction | async)!"
  [dynamic]="($dynamicSize | async)!" [isVertical]="($isVertical | async)!"
  [itemSize]="($itemSize | async)!" [trackBy]="($trackBy | async)!" [itemRenderer]="($itemRenderer | async)!"
  [startOffset]="($scrollStartOffset | async)!" [endOffset]="($scrollEndOffset | async)!"
  [scrollbarEnabled]="(scroller.$scrollbarShow | async)!"
  [enabled]="($prerenderEnabled | async)!"></prerender-container>

<ng-container *ngIf="$snap | async">
  <div localeSensitive [langTextDir]="($langTextDir | async)!" #snappedContainer class="ngvl__snapped-container"
    [ngClass]="($classes | async)!">
    <div #snapped part="snapped-item" class="ngvl__list-snapper">
      <ng-container #snapRendererContainer></ng-container>
    </div>
  </div>
</ng-container>
<ng-scroller class="ngvl__list-scroller" #scroller [classes]="($classes | async)!"
  [startOffset]="($scrollStartOffset | async)!" [direction]="($direction | async)!"
  [endOffset]="($scrollEndOffset | async)!" [scrollbarThumbRenderer]="($scrollbarThumbRenderer | async)!"
  [scrollbarThickness]="($scrollbarThickness | async)!" [scrollbarThumbParams]="($scrollbarThumbParams | async)"
  [focusedElement]="($focusedElement | async)!" [loading]="($loading | async)!"
  [overscrollEnabled]="($overscrollEnabled | async)!" [scrollbarEnabled]="($scrollbarEnabled | async)!"
  [scrollbarInteractive]="($scrollbarInteractive | async)!" [scrollbarMinSize]="($scrollbarMinSize | async)!"
  [scrollBehavior]="($scrollBehavior | async)!">
  <ng-container #renderersContainer></ng-container>
</ng-scroller>
